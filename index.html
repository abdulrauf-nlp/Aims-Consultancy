<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdulrauf | Mind Sciences Specialist</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
    <script src="https://assets.calendly.com/assets/external/widget.js" type="text/javascript" async></script>
    <style>
        :root { 
            --midnight-emerald: #042622; 
            --deep-ocean: #0a2e2a; 
            --forest-heal: #004d40; 
            --champagne-glow: #fcfaf7;
            --text-main: #1a2a28; 
            --glass: rgba(255, 255, 255, 0.5);
            --gold-edge: rgba(197, 168, 124, 0.3);
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f4f7f6; 
            margin: 0; color: var(--text-main); line-height: 1.6;
            overflow-x: hidden;
            cursor: none;
        }

        #custom-cursor {
            width: 20px; height: 20px;
            background: var(--forest-heal);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.3;
            transition: transform 0.1s ease-out;
            display: none;
        }
        @media (min-width: 768px) { #custom-cursor { display: block; } }

        .bg-orb {
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.2;
            animation: move 30s infinite alternate ease-in-out;
        }
        .orb-1 { background: #c5a87c; top: -10%; left: -10%; }
        .orb-2 { background: #004d40; bottom: 0%; right: -5%; animation-delay: -10s; }

        @keyframes move {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(100px, 150px) rotate(30deg); }
        }

        header { 
            background: linear-gradient(180deg, var(--midnight-emerald) 0%, var(--deep-ocean) 100%); 
            padding: 100px 20px 140px 20px; text-align: center; 
            border-bottom-left-radius: 60px; border-bottom-right-radius: 60px;
            position: relative;
        }

        .container { max-width: 500px; margin: -120px auto 0 auto; padding: 0 15px 120px 15px; box-sizing: border-box; position: relative; z-index: 2; }

        .bio-card {
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 35px; padding: 40px 25px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.08); margin-bottom: 30px;
            border: 1px solid var(--gold-edge);
            transition: transform 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            perspective: 1000px;
        }

        .bio-img { 
            width: 130px; height: 130px; border-radius: 40px; 
            margin: -100px auto 20px auto; border: 8px solid white; 
            object-fit: cover; box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        .bio-card h3 { 
            font-family: 'Instrument Serif', serif; 
            margin: 10px 0 5px 0; color: var(--midnight-emerald); 
            font-size: 34px; font-weight: 400; font-style: italic;
        }
        .bio-card .tagline-primary { font-size: 13px; color: var(--forest-heal); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; display: block; }
        .bio-card .tagline-secondary { font-size: 15px; color: #546e7a; font-weight: 300; font-style: italic; }

        .card { 
            background: rgba(255, 255, 255, 0.35); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 25px; padding: 25px; margin-bottom: 15px; 
            display: flex; align-items: center; gap: 18px; cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.6);
        }

        .card-text b { display: block; font-family: 'Instrument Serif', serif; font-size: 20px; color: var(--midnight-emerald); }
        .card-text span { font-size: 12px; color: #78909c; }

        .form-section { background: var(--champagne-glow); padding: 35px 25px; border-radius: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.12); border: 1px solid #eee; overflow: hidden; }
        input, select, textarea { width: 100%; padding: 18px; border: 1px solid #e0e0e0; border-radius: 18px; margin-bottom: 15px; box-sizing: border-box; background: white; font-family: inherit; }

        .btn-main { background: var(--midnight-emerald); color: white; padding: 20px; width: 100%; border: none; border-radius: 20px; font-weight: 700; font-size: 16px; cursor: pointer; }

        /* MOBILE CALENDLY FIX */
        #calendly-inline-container { 
            display: none; 
            width: 100%; 
            height: 700px; /* Fixed height for mobile */
            border-radius: 20px; 
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .loading-text { text-align: center; color: var(--forest-heal); font-weight: 500; padding: 20px; }

        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 12px 0 30px 0; 
            border-top: 1px solid rgba(0,0,0,0.03); border-radius: 35px 35px 0 0; z-index: 100;
        }
        .nav-link { text-align: center; text-decoration: none; color: #94a3b8; font-size: 9px; font-weight: 700; flex: 1; }
        .nav-link i { font-size: 20px; margin-bottom: 5px; color: #cbd5e1; }
    </style>
</head>
<body>

<div id="custom-cursor"></div>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<header></header>

<div class="container">
    <div id="home-screen">
        <div class="bio-card" id="main-bio">
            <img src="new-logo.jpeg" class="bio-img" alt="Abdul Rauf">
            <h3>Abdul Rauf</h3>
            <span class="tagline-primary">Psychologist, NLP Life Coach & Hypnotherapist</span>
            <span class="tagline-secondary">Helping you unlock the power of your subconscious mind</span>
        </div>

        <div class="card" onclick="runLogic('NLP Breakthrough')">
            <div class="card-text"><b>NLP Coaching</b><span>Rewrite mental programs</span></div>
        </div>
        <div class="card" onclick="runLogic('Hypnotherapy')">
            <div class="card-text"><b>Hypnotherapy</b><span>Deep healing for habits</span></div>
        </div>
        <div class="card" onclick="runLogic('Psychotherapy')">
            <div class="card-text"><b>Psychotherapy</b><span>Clinical emotional resilience</span></div>
        </div>
    </div>

    <div id="booking-form" class="form-section" style="display:none;">
        <button onclick="showHome()" style="border:none; background:none; color:#999; cursor:pointer; margin-bottom:15px;"><i class="fas fa-arrow-left"></i> BACK</button>
        <h3 id="service-title" style="text-align:center; margin-top:0; font-family:'Instrument Serif', serif; font-size: 28px;">Secure Your Slot</h3>
        
        <div id="form-inputs">
            <input type="hidden" id="hidden-service">
            <input type="text" id="client-name" placeholder="Full Name">
            <input type="tel" id="client-phone" placeholder="WhatsApp Number">
            <select id="session-mode">
                <option value="Online (Video Call)">Online (Video Call)</option>
                <option value="In-Person (Clinic)">In-Person (Clinic)</option>
            </select>
            <textarea id="client-goal" rows="3" placeholder="Briefly describe your concern..."></textarea>
            <button class="btn-main" onclick="submitAndBook()">Confirm & Select Time</button>
        </div>

        <div id="calendly-loader" class="loading-text" style="display:none;">
            <i class="fas fa-spinner fa-spin"></i> Loading Calendar...
        </div>
        <div id="calendly-inline-container">
            <div class="calendly-inline-widget" id="calendly-target" style="width:100%; height:100%;"></div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-link" onclick="showHome()"><i class="fas fa-home"></i><br>HOME</a>
    <a href="tel:923005364319" class="nav-link"><i class="fas fa-phone-alt"></i><br>CALL</a>
    <a href="https://wa.me/923005364319" class="nav-link" style="color: #25d366;"><i class="fab fa-whatsapp"></i><br>WHATSAPP</a>
</div>

<script>
    const MY_CALENDLY_URL = "https://calendly.com/abdulrauf-nlp/book-your-session"; 
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxqgxPJXnGiVndINcc8OoeuKAtDx5VYd0iasv0LvxAeK16p2Eg_NgurUKVlbouH3zVWNQ/exec";

    function runLogic(serviceName) {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('booking-form').style.display = 'block';
        document.getElementById('service-title').innerText = serviceName;
        document.getElementById('hidden-service').value = serviceName;
        window.scrollTo(0,0);
    }

    function showHome() { location.reload(); }

    function submitAndBook() {
        const name = document.getElementById('client-name').value;
        const phone = document.getElementById('client-phone').value;
        const service = document.getElementById('hidden-service').value;

        if(!name || !phone) { alert("Please provide your name and phone."); return; }

        // Send data to Sheet
        fetch(SCRIPT_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ 
                name, phone, 
                service, 
                mode: document.getElementById('session-mode').value,
                goal: document.getElementById('client-goal').value 
            }) 
        });

        // Toggle UI
        document.getElementById('form-inputs').style.display = 'none';
        document.getElementById('calendly-loader').style.display = 'block';
        document.getElementById('service-title').innerText = "Pick Your Time";

        // Initialize Calendly with a short delay to ensure DOM is ready on mobile
        setTimeout(() => {
            document.getElementById('calendly-loader').style.display = 'none';
            document.getElementById('calendly-inline-container').style.display = 'block';
            
            if (window.Calendly) {
                Calendly.initInlineWidget({
                    url: MY_CALENDLY_URL,
                    parentElement: document.getElementById('calendly-target'),
                    prefill: { name: name }
                });
            }
        }, 800);
    }
</script>
</body>
</html>
