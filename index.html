<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdul Rauf - Psychologist & Coach</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: var(--text-color);
            padding-bottom: 80px; /* Space for bottom nav */
        }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* Profile Section */
        .bio-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        .bio-img {
            width: 130px; height: 130px;
            border-radius: 50%;
            border: 5px solid white;
            object-fit: cover;
            margin-bottom: 15px;
        }

        /* Service Tiles */
        .services-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .tile {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            font-weight: bold;
        }

        .assessment-box {
            background: #ffde59;
            color: #333;
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Booking Form */
        .booking-form {
            background: white;
            color: #333;
            padding: 25px;
            border-radius: 30px;
            margin-bottom: 25px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: space-around;
            padding: 15px;
            backdrop-filter: blur(10px);
        }

        .bottom-nav a { color: white; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="bio-card">
        <img src="https://i.ibb.co/F4p94QZ/new-logo.jpg" class="bio-img" alt="Abdul Rauf">
        <h2>Abdul Rauf</h2>
        <div style="font-weight: bold; margin-bottom: 5px;">Psychologist, NLP Life Coach & Hypnotherapist</div>
        <div style="font-style: italic; font-size: 0.9rem; opacity: 0.8;">Helping you unlock the power of your subconscious mind</div>
    </div>

    <div class="services-grid">
        <div class="tile">NLP Coaching</div>
        <div class="tile">Hypnotherapy</div>
        <div class="tile">Psychotherapy</div>
        <div class="tile">Mindset Shift</div>
    </div>

    <div class="assessment-box">
        🚀 Start Your Mental Health Assessment
    </div>

    <div class="booking-form">
        <h3 style="margin-top: 0;">Book a Session</h3>
        <input type="text" placeholder="Your Name" id="userName">
        <input type="text" placeholder="WhatsApp Number" id="userWhatsApp">
        <select id="sessionMode">
            <option>Select Session Mode</option>
            <option>Online (Zoom/Meet)</option>
            <option>In-Person</option>
        </select>
        <textarea placeholder="Tell me about your concern..." id="userConcern"></textarea>
        <button class="whatsapp-btn" onclick="sendToWhatsApp()">Open WhatsApp</button>
    </div>
</div>

<div class="bottom-nav">
    <a href="#">🏠 Home</a>
    <a href="tel:+123456789">📞 Call</a>
    <a href="https://wa.me/yournumber">💬 WhatsApp</a>
</div>

<script>
    function sendToWhatsApp() {
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userWhatsApp').value;
        const mode = document.getElementById('sessionMode').value;
        const concern = document.getElementById('userConcern').value;
        
        const message = `Hello, I'm ${name}. I'd like to book an ${mode} session. My concern: ${concern}`;
        const url = `https://wa.me/YOUR_PHONE_NUMBER?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
