<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdulrauf | Mind Sciences Specialist</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { 
    --deep-ocean: #0a2e2a; 
    --forest-heal: #004d40; 
    --text-main: #ffffff; 
}

/* 🌌 Animated Background */
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    margin: 0;
    color: var(--text-main);
    background: linear-gradient(120deg, #0a2e2a, #004d40, #0a2e2a);
    background-size: 300% 300%;
    animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Glow blobs */
body::before,
body::after {
    content: "";
    position: fixed;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: rgba(0,255,200,0.15);
    filter: blur(80px);
    z-index: 0;
}
body::before { top: 10%; left: 10%; }
body::after { bottom: 10%; right: 10%; }

header {
    padding: 100px 20px 140px;
}

.container {
    max-width: 500px;
    margin: -120px auto 0;
    padding: 0 20px 140px;
    position: relative;
    z-index: 2;
}

/* 🧊 Glass Effect */
.bio-card,
.card,
.faq-item,
.form-section,
.quiz-box,
.bottom-nav {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    position: relative;
    overflow: hidden;
}

/* Shine effect */
.bio-card::before,
.card::before,
.form-section::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    transform: skewX(-25deg);
}

.bio-card:hover::before,
.card:hover::before {
    left: 120%;
    transition: 0.8s;
}

/* Bio */
.bio-card { padding: 35px 25px; text-align:center; }
.bio-img {
    width: 130px;
    height: 130px;
    border-radius: 40px;
    margin: -100px auto 20px;
    border: 5px solid rgba(255,255,255,0.5);
}

/* Cards */
.card {
    padding: 20px;
    display:flex;
    gap:15px;
    margin-bottom:15px;
    cursor:pointer;
    transition:0.3s;
}
.card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 20px 40px rgba(0,255,200,0.2);
}

/* Icons */
.card-icon {
    width:55px;
    height:55px;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
}
.icon-nlp { background: rgba(0,255,200,0.15); color:#00e5c0; }
.icon-hypno { background: rgba(180,150,255,0.15); color:#b388ff; }
.icon-psycho { background: rgba(255,180,100,0.15); color:#ffb74d; }

/* Buttons */
.btn-main {
    background: linear-gradient(135deg,#00c9a7,#00796b);
    color:white;
    padding:18px;
    width:100%;
    border:none;
    border-radius:20px;
    font-weight:700;
    cursor:pointer;
}
.btn-main:hover {
    transform:scale(1.05);
}

/* Inputs */
input, select, textarea {
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.15);
    color:white;
}

/* Bottom nav */
.bottom-nav {
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
    justify-content:space-around;
    padding:15px;
    z-index:100;
}
.nav-link {
    color:white;
    text-decoration:none;
    font-size:12px;
}

/* FAQ */
.faq-answer { display:none; }
</style>
</head>

<body>

<header></header>

<div class="container">

<div id="home-screen">

<div class="bio-card">
<img src="new-logo.jpeg" class="bio-img">
<h3>Abdul Rauf</h3>
<p>Psychologist | NLP Coach | Hypnotherapist</p>
</div>

<div class="card" onclick="runLogic('NLP')">
<div class="card-icon icon-nlp"><i class="fas fa-brain"></i></div>
<div><b>NLP Coaching</b><br><small>Rewrite mindset</small></div>
</div>

<div class="card" onclick="runLogic('Hypnotherapy')">
<div class="card-icon icon-hypno"><i class="fas fa-eye"></i></div>
<div><b>Hypnotherapy</b><br><small>Deep healing</small></div>
</div>

<div class="card" onclick="runLogic('Psychotherapy')">
<div class="card-icon icon-psycho"><i class="fas fa-user"></i></div>
<div><b>Psychotherapy</b><br><small>Emotional healing</small></div>
</div>

</div>

<div id="booking-form" class="form-section" style="display:none;">
<button onclick="showHome()">← Back</button>
<h3 id="service-title"></h3>

<input type="text" id="client-name" placeholder="Your Name">
<input type="tel" id="client-phone" placeholder="Phone">

<select id="session-mode">
<option>Online</option>
<option>In Person</option>
</select>

<textarea id="client-goal" placeholder="Your goal"></textarea>

<button class="btn-main" onclick="submitAndBook()">Book Now</button>
</div>

</div>

<div class="bottom-nav">
<a href="#" onclick="showHome()" class="nav-link">Home</a>
<a href="tel:923005364319" class="nav-link">Call</a>
<a href="https://wa.me/923005364319" class="nav-link">WhatsApp</a>
</div>

<script>
const MY_CALENDLY_URL = "https://calendly.com/your-link-here";

function runLogic(service) {
document.getElementById('home-screen').style.display='none';
document.getElementById('booking-form').style.display='block';
document.getElementById('service-title').innerText=service;
}

function showHome() {
document.getElementById('home-screen').style.display='block';
document.getElementById('booking-form').style.display='none';
}

function submitAndBook(){
window.location.href = MY_CALENDLY_URL;
}

/* ✨ Particles */
const canvas = document.createElement("canvas");
document.body.appendChild(canvas);
const ctx = canvas.getContext("2d");

canvas.style.position="fixed";
canvas.style.top=0;
canvas.style.left=0;
canvas.style.zIndex=0;

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<60;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(255,255,255,0.5)";
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=0.5;
if(p.y>canvas.height)p.y=0;
});
}

setInterval(draw,30);
</script>

</body>
</html>
