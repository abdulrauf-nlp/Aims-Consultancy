<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdulrauf | Mind Sciences Specialist</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { 
    --deep-ocean: #0a2e2a; 
    --forest-heal: #004d40; 
    --text-main: #2c3e50; 
    --soft-gray: #f0f4f3; 
    --white: #ffffff; 
    --glass: rgba(255, 255, 255, 0.65);
}

/* 🌌 Animated background (added, not replacing your design) */
body { 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    margin: 0; 
    color: var(--text-main); 
    line-height: 1.6;
    background: linear-gradient(120deg, #f0f4f3, #d7e3e2, #f0f4f3);
    background-size: 300% 300%;
    animation: bgMove 12s ease infinite;
}

@keyframes bgMove {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

/* Glow blobs */
body::before, body::after {
    content:"";
    position:fixed;
    width:300px;
    height:300px;
    border-radius:50%;
    background:rgba(0,255,200,0.15);
    filter:blur(80px);
    z-index:0;
}
body::before { top:10%; left:10%; }
body::after { bottom:10%; right:10%; }

header { 
    background: linear-gradient(135deg, #0a2e2a 0%, #004d40 100%); 
    padding: 100px 20px 140px 20px; 
    border-bottom-left-radius: 60px; 
    border-bottom-right-radius: 60px;
    position: relative; 
    overflow: hidden;
}

.container { 
    max-width: 500px; 
    margin: -120px auto 0 auto; 
    padding: 0 20px 140px 20px; 
    box-sizing: border-box; 
    position: relative; 
    z-index: 2; 
}

/* 🧊 GLASS UPGRADE (applied on your existing classes) */
.bio-card,
.card,
.quiz-box,
.faq-item,
.form-section,
.bottom-nav {
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.4);
}

/* Shine effect */
.card::before,
.bio-card::before {
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:60%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.5),transparent);
    transform:skewX(-25deg);
}
.card:hover::before,
.bio-card:hover::before {
    left:120%;
    transition:0.8s;
}

/* KEEPING YOUR ORIGINAL STYLES BELOW */

.bio-card {
    border-radius: 35px; padding: 35px 25px; text-align: center;
    box-shadow: 0 20px 45px rgba(0,0,0,0.06); margin-bottom: 30px;
    animation: fadeIn 0.8s ease-out;
}

@keyframes fadeIn { 
from { opacity: 0; transform: translateY(20px); } 
to { opacity: 1; transform: translateY(0); } 
}

.bio-img { 
    width: 130px; height: 130px; border-radius: 40px; 
    margin: -100px auto 20px auto; border: 8px solid var(--white); 
    object-fit: cover; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.bio-card h3 { margin: 10px 0 5px 0; color: var(--deep-ocean); font-size: 26px; font-weight: 700; }
.bio-card .tagline-primary { font-size: 15px; color: var(--forest-heal); font-weight: 700; margin-bottom: 5px; display: block; }
.bio-card .tagline-secondary { font-size: 14px; color: #546e7a; line-height: 1.4; display: block; }

.section-title { font-size: 13px; font-weight: 700; color: var(--forest-heal); text-transform: uppercase; margin: 40px 0 20px 10px; letter-spacing: 2px; opacity: 0.7; }

.card { 
    border-radius: 28px; padding: 24px; margin-bottom: 18px; 
    display: flex; align-items: center; gap: 18px; cursor: pointer; 
    transition: 0.3s;
    position:relative;
}

.card:hover { 
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 20px 40px rgba(0,255,200,0.2);
}

.card-icon { width: 55px; height: 55px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.icon-nlp { background: rgba(0,255,200,0.15); color: #00695c; }
.icon-hypno { background: rgba(180,150,255,0.15); color: #512da8; }
.icon-psycho { background: rgba(255,180,100,0.15); color: #e65100; }

.quiz-box { padding: 40px 30px; border-radius: 40px; margin: 40px 0; text-align: center; }

.btn-outline { 
    background: rgba(128, 222, 234, 0.1); border: 2px solid #80deea; color: #80deea; 
    padding: 15px; border-radius: 20px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 15px;
}

.faq-item { border-radius: 22px; padding: 20px; margin-bottom: 15px; cursor: pointer; }
.faq-question { font-weight: 700; font-size: 15px; display: flex; justify-content: space-between; align-items: center; }
.faq-answer { display: none; padding-top: 15px; font-size: 14px; color: #607d8b; }

.form-section { padding: 35px; border-radius: 40px; margin-top: 20px; }

input, select, textarea { 
    width: 100%; padding: 18px; border-radius: 15px; 
    margin-bottom: 20px; background: rgba(255,255,255,0.7);
}

.btn-main { 
    background: linear-gradient(135deg,#00c9a7,#00796b);
    color: white; padding: 20px; width: 100%; 
    border: none; border-radius: 20px; font-weight: 700;
}

.bottom-nav { 
    position: fixed; bottom: 0; left: 0; right: 0; 
    display: flex; justify-content: space-around; padding: 15px 0 35px 0; 
    border-radius: 40px 40px 0 0; z-index: 100;
}

.nav-link { text-align: center; text-decoration: none; color: #333; font-size: 11px; font-weight: 700; }
.nav-link i { font-size: 22px; margin-bottom: 6px; }

</style>
</head>
