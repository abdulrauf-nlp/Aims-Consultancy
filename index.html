<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdul Rauf | Psychologist & Life Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
    <script src="https://assets.calendly.com/assets/external/widget.js" type="text/javascript" async></script>

    <style>
        :root { 
            --midnight-emerald: #042622; 
            --deep-ocean: #0a2e2a; 
            --forest-heal: #004d40; 
            --champagne-glow: #fcfaf7;
            --text-main: #1a2a28; 
            --glass: rgba(255, 255, 255, 0.5);
            --gold-edge: rgba(197, 168, 124, 0.3);
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f4f7f6; 
            margin: 0; color: var(--text-main); line-height: 1.6;
            overflow-x: hidden;
        }

        /* Glassmorphism Background Orbs */
        .bg-orb {
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.2;
            animation: move 30s infinite alternate ease-in-out;
        }
        .orb-1 { background: #c5a87c; top: -10%; left: -10%; }
        .orb-2 { background: #004d40; bottom: 0%; right: -5%; }

        @keyframes move {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(100px, 150px) rotate(30deg); }
        }

        header { 
            background: linear-gradient(180deg, var(--midnight-emerald) 0%, var(--deep-ocean) 100%); 
            padding: 120px 20px 160px 20px; text-align: center; 
            border-bottom-left-radius: 80px; border-bottom-right-radius: 80px;
        }

        .container { max-width: 500px; margin: -140px auto 0 auto; padding: 0 20px 140px 20px; box-sizing: border-box; position: relative; z-index: 2; }

        /* Bio Card Style */
        .bio-card {
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 40px; padding: 45px 30px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.08); margin-bottom: 35px;
            border: 1px solid var(--gold-edge);
        }

        .bio-img { 
            width: 140px; height: 140px; border-radius: 50px; 
            margin: -110px auto 25px auto; object-fit: cover; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            /* Borderless as requested */
        }

        .bio-card h3 { 
            font-family: 'Instrument Serif', serif; 
            margin: 10px 0 5px 0; color: var(--midnight-emerald); 
            font-size: 38px; font-weight: 400; font-style: italic;
        }
        .tagline-primary { font-size: 14px; color: var(--forest-heal); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; display: block; }
        .tagline-secondary { font-size: 16px; color: #546e7a; font-weight: 300; font-style: italic; }

        /* Service Cards */
        .section-title { font-size: 12px; font-weight: 700; color: var(--midnight-emerald); text-transform: uppercase; margin: 45px 0 25px 10px; letter-spacing: 3px; opacity: 0.6; }
        
        .card { 
            background: rgba(255, 255, 255, 0.35); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 30px; padding: 28px; margin-bottom: 20px; 
            display: flex; align-items: center; gap: 20px; cursor: pointer; 
            transition: all 0.4s ease;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.6); border-color: #c5a87c; }

        .card-icon { width: 60px; height: 60px; border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .icon-nlp { background: #e0f2f1; color: #00695c; }
        .icon-hypno { background: #ede7f6; color: #512da8; }
        .icon-psycho { background: #fff3e0; color: #e65100; }
        
        .card-text b { display: block; font-family: 'Instrument Serif', serif; font-size: 22px; color: var(--midnight-emerald); }
        .card-text span { font-size: 13px; color: #78909c; font-weight: 500; }

        /* Form & Calendly Container */
        .form-section { background: var(--champagne-glow); padding: 45px 35px; border-radius: 50px; box-shadow: 0 40px 80px rgba(0,0,0,0.12); border: 1px solid #eee; }
        input, select, textarea { width: 100%; padding: 20px; border: 1px solid #e0e0e0; border-radius: 20px; margin-bottom: 20px; box-sizing: border-box; font-family: inherit; }

        .btn-main { background: var(--midnight-emerald); color: white; padding: 22px; width: 100%; border: none; border-radius: 25px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.4s; }

        #calendly-inline-container { 
            display: none; 
            width: 100%; 
            height: 800px; /* Increased for mobile scroll space */
            border-radius: 30px; 
            overflow: hidden;
        }

        /* Navigation */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; padding: 15px 0 35px 0; 
            border-top: 1px solid rgba(0,0,0,0.03); border-radius: 45px 45px 0 0; z-index: 100;
        }
        .nav-link { text-align: center; text-decoration: none; color: #94a3b8; font-size: 10px; font-weight: 700; flex: 1; }
        .nav-link i { font-size: 22px; margin-bottom: 8px; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<header></header>

<div class="container">
    <div id="home-screen">
        <div class="bio-card">
            <img src="new-logo.jpeg" class="bio-img" alt="Abdul Rauf">
            <h3>Abdul Rauf</h3>
            <span class="tagline-primary">Psychologist, NLP Life Coach & Hypnotherapist</span>
            <span class="tagline-secondary">Helping you unlock the power of your subconscious mind</span>
        </div>

        <div class="section-title">Our Services</div>
        <div class="card" onclick="openBooking('NLP Breakthrough')">
            <div class="card-icon icon-nlp"><i class="fas fa-brain"></i></div>
            <div class="card-text"><b>NLP Coaching</b><span>Rewrite mental programs</span></div>
        </div>
        <div class="card" onclick="openBooking('Hypnotherapy')">
            <div class="card-icon icon-hypno"><i class="fas fa-eye"></i></div>
            <div class="card-text"><b>Hypnotherapy</b><span>Deep healing for habits</span></div>
        </div>
        <div class="card" onclick="openBooking('Psychotherapy')">
            <div class="card-icon icon-psycho"><i class="fas fa-user-shield"></i></div>
            <div class="card-text"><b>Psychotherapy</b><span>Clinical emotional resilience</span></div>
        </div>
    </div>

    <div id="booking-screen" class="form-section" style="display:none;">
        <button onclick="goBack()" style="border:none; background:none; color:#999; cursor:pointer; margin-bottom:20px;"><i class="fas fa-arrow-left"></i> BACK</button>
        <h3 id="service-title" style="text-align:center; font-family:'Instrument Serif', serif; font-size: 32px; margin-top:0;">Secure Your Slot</h3>
        
        <div id="form-inputs">
            <input type="text" id="client-name" placeholder="Full Name">
            <input type="tel" id="client-phone" placeholder="WhatsApp Number">
            <select id="session-mode">
                <option value="Online (Video Call)">Online (Video Call)</option>
                <option value="In-Person (Clinic)">In-Person (Clinic)</option>
            </select>
            <textarea id="client-goal" rows="3" placeholder="How can I help you today?"></textarea>
            <button class="btn-main" onclick="processBooking()">Confirm & Select Time <i class="fas fa-calendar-alt" style="margin-left:10px;"></i></button>
        </div>

        <div id="calendly-inline-container">
            <div class="calendly-inline-widget" id="calendly-target" style="min-width:320px; height:750px;"></div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-link" onclick="goBack()"><i class="fas fa-home"></i><br>HOME</a>
    <a href="tel:923005364319" class="nav-link"><i class="fas fa-phone-alt"></i><br>CALL</a>
    <a href="https://wa.me/923005364319" class="nav-link" style="color: #25d366;"><i class="fab fa-whatsapp"></i><br>WHATSAPP</a>
</div>

<script>
    const CALENDLY_URL = "https://calendly.com/abdulrauf-nlp/book-your-session";
    const APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbxqgxPJXnGiVndINcc8OoeuKAtDx5VYd0iasv0LvxAeK16p2Eg_NgurUKVlbouH3zVWNQ/exec";

    function openBooking(service) {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('booking-screen').style.display = 'block';
        document.getElementById('service-title').innerText = service;
        window.scrollTo(0,0);
    }

    function goBack() {
        document.getElementById('home-screen').style.display = 'block';
        document.getElementById('booking-screen').style.display = 'none';
        document.getElementById('form-inputs').style.display = 'block';
        document.getElementById('calendly-inline-container').style.display = 'none';
    }

    function processBooking() {
        const name = document.getElementById('client-name').value;
        const phone = document.getElementById('client-phone').value;
        const service = document.getElementById('service-title').innerText;

        if(!name || !phone) { alert("Please fill in your details."); return; }

        // Send to Google Sheets
        fetch(APPS_SCRIPT, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                name: name,
                phone: phone,
                service: service,
                mode: document.getElementById('session-mode').value,
                goal: document.getElementById('client-goal').value
            })
        });

        // UI Transition
        document.getElementById('form-inputs').style.display = 'none';
        document.getElementById('service-title').innerText = "Pick Your Time";
        const container = document.getElementById('calendly-inline-container');
        container.style.display = 'block';

        // Initialize Calendly with explicit timeout for mobile stability
        setTimeout(() => {
            if (window.Calendly) {
                Calendly.initInlineWidget({
                    url: CALENDLY_URL,
                    parentElement: document.getElementById('calendly-target'),
                    prefill: { name: name }
                });
            }
        }, 500);
    }
</script>

</body>
</html>
