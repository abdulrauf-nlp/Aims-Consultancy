<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdul Rauf | Mind Sciences</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --apple-black: #1d1d1f;
            --apple-gray: #f5f5f7;
            --accent-teal: #008073;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --card-shadow: 0 8px 30px rgba(0,0,0,0.04);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--apple-gray);
            color: var(--apple-black);
            margin: 0;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- Premium Header --- */
        header {
            padding: 80px 20px 160px;
            background: #ffffff;
            text-align: center;
        }

        .hero-title {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #1d1d1f 0%, #434345 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- The Bento Profile Card --- */
        .container {
            max-width: 440px;
            margin: -120px auto 100px;
            padding: 0 20px;
        }

        .profile-bento {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 38px;
            padding: 40px 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: var(--card-shadow);
        }

        .bio-img {
            width: 110px;
            height: 110px;
            border-radius: 32px; /* Apple-style rounded rect */
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .tagline-primary {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--accent-teal);
            display: block;
            margin-bottom: 8px;
        }

        .tagline-secondary {
            font-size: 16px;
            color: #86868b;
            line-height: 1.5;
        }

        /* --- Grid of Transformation (Bento Style) --- */
        .bento-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 30px;
        }

        .bento-item {
            background: #ffffff;
            border-radius: 28px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            border: 1px solid transparent;
        }

        .bento-item:hover {
            transform: scale(1.02);
            border-color: var(--accent-teal);
        }

        .bento-item i {
            font-size: 24px;
            margin-bottom: 12px;
            color: var(--accent-teal);
        }

        .bento-item.large { grid-column: span 2; background: var(--apple-black); color: white; }
        .bento-item.large i { color: #5ce1e6; }

        /* --- Premium Form UI --- */
        .form-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            z-index: 1000;
            display: none;
            padding: 40px 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        input, select, textarea {
            width: 100%;
            background: #f5f5f7;
            border: none;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
            font-size: 16px;
            font-family: inherit;
        }

        .cta-button {
            background: var(--apple-black);
            color: white;
            border: none;
            padding: 22px;
            border-radius: 20px;
            width: 100%;
            font-weight: 600;
            font-size: 17px;
            cursor: pointer;
            transition: 0.3s;
        }

        .cta-button:hover { opacity: 0.9; transform: translateY(-2px); }

        /* --- Minimal Bottom Nav --- */
        .apple-nav {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(29, 29, 31, 0.8);
            backdrop-filter: blur(15px);
            padding: 8px 30px;
            border-radius: 50px;
            display: flex;
            gap: 40px;
            z-index: 999;
        }

        .apple-nav a { color: #f5f5f7; text-decoration: none; font-size: 20px; padding: 10px; }
    </style>
</head>
<body>

<header>
    <h1 class="hero-title">Elevate Your Mind.</h1>
</header>

<div class="container">
    <div class="profile-bento">
        <img src="new-logo.jpeg" class="bio-img" alt="Abdul Rauf">
        <span class="tagline-primary">Psychologist, NLP Life Coach & Hypnotherapist</span>
        <span class="tagline-secondary">Helping you unlock the power of your subconscious mind.</span>
    </div>

    <div class="bento-grid">
        <div class="bento-item large" onclick="openBooking('Free Discovery Call')">
            <i class="fas fa-bolt"></i>
            <div style="font-weight: 700; font-size: 18px;">Start Assessment</div>
            <div style="font-size: 13px; opacity: 0.7;">Find your custom growth path</div>
        </div>

        <div class="bento-item" onclick="openBooking('NLP Breakthrough')">
            <i class="fas fa-brain"></i>
            <div style="font-weight: 600;">NLP</div>
        </div>

        <div class="bento-item" onclick="openBooking('Hypnotherapy')">
            <i class="fas fa-moon"></i>
            <div style="font-weight: 600;">Healing</div>
        </div>
    </div>
</div>

<div id="booking-overlay" class="form-overlay">
    <div style="max-width: 400px; margin: auto;">
        <button onclick="closeBooking()" style="border:none; background:none; font-size: 18px; cursor:pointer; margin-bottom: 30px;">✕ Close</button>
        <h2 id="service-name" style="letter-spacing: -1px; font-size: 32px;">Book Session</h2>
        
        <label style="font-size: 12px; font-weight: 600; color: #86868b; margin-left: 10px;">NAME</label>
        <input type="text" id="name" placeholder="John Doe">
        
        <label style="font-size: 12px; font-weight: 600; color: #86868b; margin-left: 10px;">WHATSAPP</label>
        <input type="tel" id="whatsapp" placeholder="+92 ...">
        
        <label style="font-size: 12px; font-weight: 600; color: #86868b; margin-left: 10px;">CONCERN</label>
        <textarea id="concern" rows="4" placeholder="How can I help you?"></textarea>

        <button class="cta-button" onclick="finalize()">Confirm Selection</button>
    </div>
</div>

<nav class="apple-nav">
    <a href="#"><i class="fas fa-home"></i></a>
    <a href="tel:923005364319"><i class="fas fa-phone"></i></a>
    <a href="https://wa.me/923005364319" style="color: #25d366;"><i class="fab fa-whatsapp"></i></a>
</nav>

<script>
    function openBooking(service) {
        document.getElementById('service-name').innerText = service;
        document.getElementById('booking-overlay').style.display = 'block';
        document.body.style.overflow = 'hidden'; // Prevent background scroll
    }

    function closeBooking() {
        document.getElementById('booking-overlay').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function finalize() {
        // Logic to send to Sheets or Calendly
        const name = document.getElementById('name').value;
        if(!name) { alert("Please enter your name"); return; }
        
        // Link to your actual Calendly
        window.location.href = "https://calendly.com/your-link-here";
    }
</script>

</body>
</html>
